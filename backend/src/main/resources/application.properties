spring.datasource.url=jdbc:mysql://localhost:3306/blood_donor_system?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=yourpassword
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql

server.port=8080

jwt.secret=blooddonorsystemsecretkey2024xxxxxxxxxxxxxxxxxxxxxxxxxxx
jwt.expiration=86400000

logging.level.com.blooddonor=DEBUG
logging.level.org.springframework.security=DEBUG
